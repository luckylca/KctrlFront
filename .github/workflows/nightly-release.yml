name: Nightly Build And Release

on:
  schedule:
    # UTC 16:00 = Asia/Shanghai 00:00 (next day)
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Date Code
        id: meta
        run: |
          DATE_CODE=$(TZ=Asia/Shanghai date +'%y%m%d')
          echo "date_code=${DATE_CODE}" >> "$GITHUB_OUTPUT"

      - name: Validate Signing Secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          [ -n "$KEYSTORE_BASE64" ] || { echo "Missing secret: KEYSTORE_BASE64"; exit 1; }
          [ -n "$KEYSTORE_PASSWORD" ] || { echo "Missing secret: KEYSTORE_PASSWORD"; exit 1; }
          [ -n "$KEY_ALIAS" ] || { echo "Missing secret: KEY_ALIAS"; exit 1; }
          [ -n "$KEY_PASSWORD" ] || { echo "Missing secret: KEY_PASSWORD"; exit 1; }

      - name: Restore Keystore From Secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/idlike.jks

      - name: Build Android Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease -PciVersionCode=${{ steps.meta.outputs.date_code }}

      - name: Prepare Release Artifacts
        run: |
          mkdir -p nightly
          DATE_CODE="${{ steps.meta.outputs.date_code }}"
          find android/app/build/outputs/apk/release -name "*.apk" -type f | while read -r file; do
            base="$(basename "$file" .apk)"
            cp "$file" "nightly/${base}-${DATE_CODE}.apk"
          done
          ls -lh nightly

      - name: Publish Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Nightly
          name: Nightly
          prerelease: true
          make_latest: false
          overwrite_files: true
          generate_release_notes: true
          body: |
            Automated nightly build.
            versionCode: ${{ steps.meta.outputs.date_code }}
            versionName: from android/app/build.gradle (unchanged)
          files: nightly/*.apk
          
      - name: Upload nightly release on workflow
        uses: actions/upload-artifact@v4
        with:
         name: manager
         path: nightly/*
